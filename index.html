<!doctype html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>進階小畫板</title>
<style>
  :root { --bg:#f3f4f6; --line:#d1d5db; --text:#111827; }
  body { margin:0; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); padding:16px; }
  .app { max-width:1400px; margin:0 auto; }
  .toolbar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:12px; }
  .toolbar > * { height:40px; }
  button, input, select { border:1px solid var(--line); background:#fff; border-radius:8px; padding:0 10px; }
  button { cursor:pointer; }
  button.active { background:#111827; color:#fff; }
  button:disabled { opacity:.45; cursor:not-allowed; }
  .layout { display:grid; grid-template-columns: 1fr 280px; gap:12px; align-items:start; }
  .canvas-wrap { border:1px solid var(--line); border-radius:12px; overflow:hidden; background:#fff; }
  canvas { display:block; width:100%; height:78vh; touch-action:none; background:#fff; }
  .side { border:1px solid var(--line); border-radius:12px; background:#fff; padding:12px; }
  .side h3 { margin:0 0 10px; font-size:16px; }
  .stack { display:flex; flex-direction:column; gap:10px; }
  .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .row label { font-size:14px; color:#374151; }
  textarea { width:100%; min-height:90px; border:1px solid var(--line); border-radius:8px; padding:8px; font:inherit; resize:vertical; }
  .hint { margin-top:10px; font-size:13px; color:#6b7280; line-height:1.5; }
  .small { font-size:13px; color:#4b5563; }
</style>
</head>
<body>
<div class="app">
  <div class="toolbar">
    <input type="color" id="color" value="#000000">
    <input type="range" id="size" min="1" max="40" value="6">
    <input type="range" id="opacity" min="0.05" max="1" step="0.05" value="1">
    <button id="penBtn" class="active">畫筆</button>
    <button id="eraserBtn">橡皮擦</button>
    <button id="lineBtn">直線</button>
    <button id="rectBtn">矩形</button>
    <button id="circleBtn">圓形</button>
    <button id="textBtn">文字</button>
    <button id="panBtn">平移</button>
    <button id="undoBtn">Undo</button>
    <button id="redoBtn">Redo</button>
    <button id="clearBtn">清空</button>
    <button id="gridBtn">網格</button>
    <input type="file" id="bgInput" accept="image/*">
    <button id="savePng">下載 PNG</button>
    <button id="saveJpg">下載 JPG</button>
  </div>
  <div class="layout">
    <div class="canvas-wrap"><canvas id="canvas"></canvas></div>
    <div class="side">
      <h3>文字工具</h3>
      <div class="stack">
        <div class="row"><label for="textSize">字體大小</label><input type="range" id="textSize" min="10" max="120" value="32"></div>
        <div class="row"><label for="fontFamily">字體</label><select id="fontFamily"><option value="system-ui">System</option><option value="Arial">Arial</option><option value="Georgia">Georgia</option><option value="Times New Roman">Times New Roman</option><option value="Courier New">Courier New</option></select></div>
        <div class="small">選文字工具後，喺畫布撳一下，再輸入文字。</div>
        <textarea id="textInput" placeholder="輸入文字，然後按 Enter 或點入畫布放置"></textarea>
      </div>
      <h3 style="margin-top:16px;">操作</h3>
      <div class="hint">
        <div>• Ctrl/Cmd + Z：Undo</div>
        <div>• Ctrl/Cmd + Y：Redo</div>
        <div>• Ctrl/Cmd + Shift + Z：Redo</div>
        <div>• 滾輪：放大縮小</div>
        <div>• 中鍵/Space 拖曳：平移</div>
      </div>
    </div>
  </div>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const colorInput = document.getElementById('color');
const sizeInput = document.getElementById('size');
const opacityInput = document.getElementById('opacity');
const textSizeInput = document.getElementById('textSize');
const fontFamilyInput = document.getElementById('fontFamily');
const textInput = document.getElementById('textInput');
const penBtn = document.getElementById('penBtn');
const eraserBtn = document.getElementById('eraserBtn');
const lineBtn = document.getElementById('lineBtn');
const rectBtn = document.getElementById('rectBtn');
const circleBtn = document.getElementById('circleBtn');
const textBtn = document.getElementById('textBtn');
const panBtn = document.getElementById('panBtn');
const undoBtn = document.getElementById('undoBtn');
const redoBtn = document.getElementById('redoBtn');
const clearBtn = document.getElementById('clearBtn');
const gridBtn = document.getElementById('gridBtn');
const bgInput = document.getElementById('bgInput');
const savePng = document.getElementById('savePng');
const saveJpg = document.getElementById('saveJpg');
const STORAGE_KEY = 'advanced-drawing-board-v3';
let dpr = window.devicePixelRatio || 1;
let mode = 'pen';
let drawing = false;
let panning = false;
let spaceDown = false;
let showGrid = true;
let strokes = [];
let redoStack = [];
let backgroundImage = null;
let currentStroke = null;
let pendingText = null;
let view = { scale: 1, x: 0, y: 0 };
let panStart = null;
function resizeCanvas(){ const rect=canvas.getBoundingClientRect(); const old=canvas.toDataURL(); canvas.width=Math.round(rect.width*dpr); canvas.height=Math.round(rect.height*dpr); ctx.setTransform(dpr,0,0,dpr,0,0); const img=new Image(); img.onload=()=>{ ctx.drawImage(img,0,0,rect.width,rect.height); redraw(); }; img.src=old; }
function screenToWorld(x,y){ return { x:(x-view.x)/view.scale, y:(y-view.y)/view.scale }; }
function worldToScreen(x,y){ return { x:x*view.scale+view.x, y:y*view.scale+view.y }; }
function getPos(e){ const rect=canvas.getBoundingClientRect(); return { x:e.clientX-rect.left, y:e.clientY-rect.top }; }
function setMode(next){ mode=next; [penBtn,eraserBtn,lineBtn,rectBtn,circleBtn,textBtn,panBtn].forEach(b=>b.classList.remove('active')); ({pen:penBtn,eraser:eraserBtn,line:lineBtn,rect:rectBtn,circle:circleBtn,text:textBtn,pan:panBtn})[mode].classList.add('active'); }
function drawGrid(){ if(!showGrid) return; const step=25*view.scale; if(step<12) return; const rect=canvas.getBoundingClientRect(); ctx.save(); ctx.strokeStyle='rgba(0,0,0,0.08)'; ctx.lineWidth=1; for(let x=((view.x%step)+step)%step; x<rect.width; x+=step){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,rect.height); ctx.stroke(); } for(let y=((view.y%step)+step)%step; y<rect.height; y+=step){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(rect.width,y); ctx.stroke(); } ctx.restore(); }
function drawBackground(){ const rect=canvas.getBoundingClientRect(); ctx.save(); ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,canvas.width,canvas.height); ctx.restore(); if(backgroundImage){ const iw=backgroundImage.width, ih=backgroundImage.height; const scale=Math.min((rect.width-20)/iw,(rect.height-20)/ih); const w=iw*scale, h=ih*scale, x=(rect.width-w)/2, y=(rect.height-h)/2; ctx.drawImage(backgroundImage,x,y,w,h); } if(showGrid) drawGrid(); }
function drawStroke(s){ ctx.save(); ctx.lineCap='round'; ctx.lineJoin='round'; ctx.globalAlpha=s.opacity ?? 1; if(['pen','line','rect','circle','text'].includes(s.type)){ ctx.globalCompositeOperation='source-over'; ctx.strokeStyle=s.color; ctx.fillStyle=s.color; ctx.lineWidth=s.size; } else { ctx.globalCompositeOperation='destination-out'; ctx.strokeStyle='rgba(0,0,0,1)'; ctx.lineWidth=s.size; }
  if(s.type==='pen' || s.type==='eraser'){ if(!s.points?.length){ ctx.restore(); return; } ctx.beginPath(); ctx.moveTo(...Object.values(worldToScreen(s.points[0].x,s.points[0].y))); for(let i=1;i<s.points.length;i++) ctx.lineTo(...Object.values(worldToScreen(s.points[i].x,s.points[i].y))); ctx.stroke(); }
  else if(s.type==='line'){ const a=worldToScreen(s.x1,s.y1), b=worldToScreen(s.x2,s.y2); ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }
  else if(s.type==='rect'){ const a=worldToScreen(s.x1,s.y1), b=worldToScreen(s.x2,s.y2); ctx.strokeRect(Math.min(a.x,b.x), Math.min(a.y,b.y), Math.abs(b.x-a.x), Math.abs(b.y-a.y)); }
  else if(s.type==='circle'){ const a=worldToScreen(s.x1,s.y1), b=worldToScreen(s.x2,s.y2); const r=Math.hypot(b.x-a.x,b.y-a.y); ctx.beginPath(); ctx.arc(a.x,a.y,r,0,Math.PI*2); ctx.stroke(); }
  else if(s.type==='text'){ const p=worldToScreen(s.x,s.y); ctx.fillStyle=s.color; ctx.font=`${s.size}px ${s.fontFamily}`; ctx.textBaseline='top'; (s.text||'').split('\n').forEach((line,i)=>ctx.fillText(line,p.x,p.y+i*s.size*1.2)); }
  ctx.restore(); }
function redraw(){ drawBackground(); ctx.save(); ctx.setTransform(dpr,0,0,dpr,0,0); ctx.translate(view.x/dpr, view.y/dpr); ctx.scale(view.scale, view.scale); strokes.forEach(drawStroke); if(currentStroke) drawStroke(currentStroke); ctx.restore(); autoSave(); }
function updateHistoryButtons(){ undoBtn.disabled = strokes.length===0; redoBtn.disabled = redoStack.length===0; }
function pushStroke(s){ strokes.push(s); redoStack=[]; updateHistoryButtons(); redraw(); }
function autoSave(){ localStorage.setItem(STORAGE_KEY, JSON.stringify({ strokes, mode, color:colorInput.value, size:sizeInput.value, opacity:opacityInput.value, textSize:textSizeInput.value, fontFamily:fontFamilyInput.value, background:backgroundImage ? backgroundImage.src : null, view, showGrid })); }
function loadSaved(){ const raw=localStorage.getItem(STORAGE_KEY); if(!raw) return; const data=JSON.parse(raw); strokes=data.strokes||[]; mode=data.mode||'pen'; colorInput.value=data.color||'#000000'; sizeInput.value=data.size||6; opacityInput.value=data.opacity||1; textSizeInput.value=data.textSize||32; fontFamilyInput.value=data.fontFamily||'system-ui'; view=data.view||view; showGrid=data.showGrid ?? true; if(data.background){ const img=new Image(); img.onload=()=>{ backgroundImage=img; redraw(); }; img.src=data.background; } else redraw(); setMode(mode); gridBtn.classList.toggle('active', showGrid); updateHistoryButtons(); }
function startPan(e){ panning=true; panStart={ x:e.clientX, y:e.clientY, vx:view.x, vy:view.y }; }
function applyPan(e){ if(!panning || !panStart) return; view.x = panStart.vx + (e.clientX - panStart.x); view.y = panStart.vy + (e.clientY - panStart.y); redraw(); }
function stopPan(){ panning=false; panStart=null; }
canvas.addEventListener('pointerdown', (e)=>{ canvas.setPointerCapture(e.pointerId); const {x,y}=getPos(e); const world=screenToWorld(x,y); if(mode==='pan' || spaceDown || e.button===1){ startPan(e); return; } if(mode==='text'){ pendingText={ x:world.x, y:world.y }; const t=(textInput.value||'').trim(); if(t){ pushStroke({ type:'text', x:world.x, y:world.y, text:t, color:colorInput.value, size:Number(textSizeInput.value), fontFamily:fontFamilyInput.value }); textInput.value=''; pendingText=null; } return; } drawing=true; currentStroke={ type:mode, color:colorInput.value, size:Number(sizeInput.value), opacity:Number(opacityInput.value), points:[] }; if(mode==='line' || mode==='rect' || mode==='circle'){ currentStroke.x1=world.x; currentStroke.y1=world.y; currentStroke.x2=world.x; currentStroke.y2=world.y; } else { currentStroke.points=[world]; } });
canvas.addEventListener('pointermove', (e)=>{ if(panning){ applyPan(e); return; } if(!drawing || !currentStroke) return; const {x,y}=getPos(e); const world=screenToWorld(x,y); if(currentStroke.type==='pen' || currentStroke.type==='eraser'){ currentStroke.points.push(world); } else { currentStroke.x2=world.x; currentStroke.y2=world.y; } redraw(); });
function finish(){ if(panning){ stopPan(); return; } if(!drawing || !currentStroke) return; drawing=false; if(currentStroke.type==='pen' || currentStroke.type==='eraser'){ if(currentStroke.points.length>1) pushStroke(currentStroke); } else { pushStroke(currentStroke); } currentStroke=null; }
canvas.addEventListener('pointerup', finish); canvas.addEventListener('pointercancel', finish); canvas.addEventListener('pointerleave', finish);
canvas.addEventListener('wheel', (e)=>{ e.preventDefault(); const factor=e.deltaY<0 ? 1.1 : 0.9; const rect=canvas.getBoundingClientRect(); const mx=e.clientX-rect.left, my=e.clientY-rect.top; const before=screenToWorld(mx,my); view.scale=Math.min(5, Math.max(0.25, view.scale*factor)); const after=worldToScreen(before.x,before.y); view.x += mx-after.x; view.y += my-after.y; redraw(); }, { passive:false });
window.addEventListener('keydown', (e)=>{ if(e.key===' '){ spaceDown=true; } const z=(e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='z'; const y=(e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='y'; const shiftZ=(e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key.toLowerCase()==='z'; if(z && !shiftZ){ e.preventDefault(); undoBtn.click(); } if(y || shiftZ){ e.preventDefault(); redoBtn.click(); } });
window.addEventListener('keyup', (e)=>{ if(e.key===' ') spaceDown=false; });
penBtn.onclick=()=>setMode('pen'); eraserBtn.onclick=()=>setMode('eraser'); lineBtn.onclick=()=>setMode('line'); rectBtn.onclick=()=>setMode('rect'); circleBtn.onclick=()=>setMode('circle'); textBtn.onclick=()=>setMode('text'); panBtn.onclick=()=>setMode('pan');
undoBtn.onclick=()=>{ if(!strokes.length) return; redoStack.push(strokes.pop()); updateHistoryButtons(); redraw(); };
redoBtn.onclick=()=>{ if(!redoStack.length) return; strokes.push(redoStack.pop()); updateHistoryButtons(); redraw(); };
clearBtn.onclick=()=>{ strokes=[]; redoStack=[]; currentStroke=null; pendingText=null; backgroundImage=null; localStorage.removeItem(STORAGE_KEY); if (ctx.reset) { ctx.reset(); } else { ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,canvas.width,canvas.height); } updateHistoryButtons(); redraw(); };
gridBtn.onclick=()=>{ showGrid=!showGrid; gridBtn.classList.toggle('active', showGrid); redraw(); };
bgInput.onchange=(e)=>{ const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=()=>{ const img=new Image(); img.onload=()=>{ backgroundImage=img; redraw(); }; img.src=reader.result; }; reader.readAsDataURL(file); };
function exportImage(type, filename){ const exportCanvas=document.createElement('canvas'); exportCanvas.width=canvas.width; exportCanvas.height=canvas.height; const ectx=exportCanvas.getContext('2d'); ectx.fillStyle='#ffffff'; ectx.fillRect(0,0,exportCanvas.width,exportCanvas.height); if(backgroundImage){ const iw=backgroundImage.width, ih=backgroundImage.height; const scale=Math.min((exportCanvas.width/dpr-20)/iw, (exportCanvas.height/dpr-20)/ih); const w=iw*scale, h=ih*scale, x=((exportCanvas.width/dpr)-w)/2, y=((exportCanvas.height/dpr)-h)/2; ectx.drawImage(backgroundImage, x*dpr, y*dpr, w*dpr, h*dpr); } ectx.save(); ectx.setTransform(dpr,0,0,dpr,0,0); ectx.translate(view.x/dpr, view.y/dpr); ectx.scale(view.scale, view.scale); strokes.forEach((s)=>{ ectx.save(); ectx.lineCap='round'; ectx.lineJoin='round'; ectx.globalAlpha=s.opacity ?? 1; if(['pen','line','rect','circle','text'].includes(s.type)){ ectx.globalCompositeOperation='source-over'; ectx.strokeStyle=s.color; ectx.fillStyle=s.color; ectx.lineWidth=s.size; } else { ectx.globalCompositeOperation='destination-out'; ectx.strokeStyle='rgba(0,0,0,1)'; ectx.lineWidth=s.size; } if(s.type==='pen' || s.type==='eraser'){ ectx.beginPath(); ectx.moveTo(s.points[0].x,s.points[0].y); for(let i=1;i<s.points.length;i++) ectx.lineTo(s.points[i].x,s.points[i].y); ectx.stroke(); } else if(s.type==='line'){ ectx.beginPath(); ectx.moveTo(s.x1,s.y1); ectx.lineTo(s.x2,s.y2); ectx.stroke(); } else if(s.type==='rect'){ ectx.strokeRect(Math.min(s.x1,s.x2), Math.min(s.y1,s.y2), Math.abs(s.x2-s.x1), Math.abs(s.y2-s.y1)); } else if(s.type==='circle'){ const r=Math.hypot(s.x2-s.x1,s.y2-s.y1); ectx.beginPath(); ectx.arc(s.x1,s.y1,r,0,Math.PI*2); ectx.stroke(); } else if(s.type==='text'){ ectx.font=`${s.size}px ${s.fontFamily}`; ectx.textBaseline='top'; (s.text||'').split('\n').forEach((line,i)=>ectx.fillText(line,s.x,s.y+i*s.size*1.2)); } ectx.restore(); }); ectx.restore(); exportCanvas.toBlob((blob)=>{ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); }, type, type==='image/jpeg' ? 0.92 : undefined); }
savePng.onclick=()=>exportImage('image/png','drawing.png'); saveJpg.onclick=()=>exportImage('image/jpeg','drawing.jpg');
window.addEventListener('resize', ()=>{ dpr=window.devicePixelRatio||1; resizeCanvas(); redraw(); });
resizeCanvas(); loadSaved();
</script>
</body>
</html>
